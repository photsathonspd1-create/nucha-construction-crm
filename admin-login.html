<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUCHA CRM — เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --red: #D60000; --red-dark: #B00000; --red-soft: #FFF0F0;
            --gray-50: #F7F5F4; --gray-100: #F0EDEB; --gray-200: #E4E0DE;
            --gray-400: #9B9593; --gray-500: #6E6866; --gray-600: #4A4543;
            --white: #FFFFFF; --font-thai: 'Noto Sans Thai', sans-serif;
            --font-display: 'Inter', sans-serif;
        }
        body {
            font-family: var(--font-thai); background: var(--gray-50);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            width: 100%; max-width: 420px; padding: 20px;
        }
        .login-card {
            background: var(--white); border-radius: 20px; padding: 48px 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .login-logo {
            display: flex; align-items: center; gap: 12px;
            justify-content: center; margin-bottom: 36px;
        }
        .login-logo-icon {
            width: 48px; height: 48px; background: var(--red);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; color: var(--white);
            font-family: var(--font-display); font-weight: 900; font-size: 1.4rem;
        }
        .login-logo-text {
            font-family: var(--font-display); font-size: 0.65rem;
            font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
            line-height: 1.3; color: var(--gray-600);
        }
        .login-title {
            font-family: var(--font-display); font-size: 1.4rem;
            font-weight: 800; color: var(--gray-600); text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 0.88rem; color: var(--gray-400); text-align: center;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 600;
            color: var(--gray-600); margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 14px 18px; border: 2px solid var(--gray-200);
            border-radius: 12px; font-size: 0.95rem; font-family: var(--font-thai);
            color: var(--gray-600); transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(214, 0, 0, 0.08);
        }
        .btn-login {
            width: 100%; padding: 16px; background: var(--red); color: var(--white);
            border: none; border-radius: 50px; font-size: 1rem; font-weight: 700;
            font-family: var(--font-thai); cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(214, 0, 0, 0.25);
        }
        .btn-login:hover {
            background: var(--red-dark); transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(214, 0, 0, 0.35);
        }
        .btn-login:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        .error-msg {
            display: none; padding: 12px 16px; background: var(--red-soft);
            color: var(--red); border-radius: 10px; font-size: 0.85rem;
            font-weight: 600; margin-bottom: 20px; text-align: center;
        }
        .error-msg.show { display: block; }
        .back-link {
            display: block; text-align: center; margin-top: 24px;
            font-size: 0.85rem; color: var(--gray-400);
        }
        .back-link a { color: var(--red); font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">N</div>
                <div class="login-logo-text">NUCHA<br>INNOVATION</div>
            </div>
            <h1 class="login-title">เข้าสู่ระบบ CRM</h1>
            <p class="login-subtitle">กรอกอีเมลและรหัสผ่านเพื่อเข้าใช้งาน</p>

            <div class="error-msg" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" placeholder="admin@nuchainnovation.com" required>
                </div>
                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">เข้าสู่ระบบ</button>
            </form>

            <div class="back-link">
                <a href="index.html">← กลับหน้าเว็บหลัก</a>
            </div>
        </div>
    </div>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase/config.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const btnLogin = document.getElementById('btnLogin');

        // Check if already logged in
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) window.location.href = 'admin.html';
        })();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');
            btnLogin.disabled = true;
            btnLogin.textContent = 'กำลังเข้าสู่ระบบ...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'admin.html';
            } catch (err) {
                errorMsg.textContent = err.message === 'Invalid login credentials'
                    ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'
                    : 'เกิดข้อผิดพลาด: ' + err.message;
                errorMsg.classList.add('show');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'เข้าสู่ระบบ';
            }
        });
    </script>
</body>
</html>
